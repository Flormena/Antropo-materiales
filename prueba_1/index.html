<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link href="publication-web-resources/css/main.css" rel="stylesheet">
<script src="publication-web-resources/script/main.js"></script>

<style>
html, body {
  height:100%;
  margin:0;
  overflow:hidden;
  background:#111;
}

/* pantalla */
#viewport{
  position:fixed;
  inset:0;
  display:grid;
  place-items:center;
}

/* stage escalable */
#stage{
  width:var(--w);
  height:var(--h);
  transform-origin:top left;
  transform:scale(var(--s));
}

/* iframe */
#contentIFrame{
  width:var(--w);
  height:var(--h);
  border:0;
  display:block;
}

/* BOTONES */
.prev, .next{
  position:fixed;
  top:50%;
  transform:translateY(-50%);
  z-index:9999;
  font-size:60px;
  cursor:pointer;
  color:white;
  padding:10px 18px;
  background:rgba(0,0,0,0.3);
  border-radius:10px;
  user-select:none;
}

.prev{ left:10px; }
.next{ right:10px; }
</style>
</head>

<body onload="showHideArrows()">

<div id="viewport">
  <div id="stage">
    <iframe 
      id="contentIFrame"
      src="publication-web-resources/html/publication.html">
    </iframe>
  </div>
</div>

<div class="prev" onclick="showPreviousPage()">&#10094;</div>
<div class="next" onclick="showNextPage()">&#10095;</div>

<script>
const BASE_W = 1920;

function fit(){
  const iframe = document.getElementById('contentIFrame');
  const stage  = document.getElementById('stage');

  let h = 1080;

  try{
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    const body = doc.body;
    const html = doc.documentElement;
    h = Math.max(
      body.scrollHeight, body.offsetHeight,
      html.clientHeight, html.scrollHeight, html.offsetHeight
    );
  }catch(e){}

  stage.style.setProperty('--w', BASE_W+'px');
  stage.style.setProperty('--h', h+'px');

  const s = Math.min(window.innerWidth/BASE_W, window.innerHeight/h);
  stage.style.setProperty('--s', s);
}

window.addEventListener('resize', fit);
document.getElementById('contentIFrame').addEventListener('load', fit);
</script>

</body>
</html>
