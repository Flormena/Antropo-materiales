<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link href="publication-web-resources/css/main.css" rel="stylesheet">
<script src="publication-web-resources/script/main.js"></script>

<style>
html, body {
  height:100%;
  margin:0;
  overflow:hidden;
  background:#111;
}

/* pantalla */
#viewport{
  position:fixed;
  inset:0;
  display:grid;
  place-items:center;
}

/* stage */
#stage{
  width:1920px;
  height:1080px;
}

/* iframe base tamaño real del diseño */
#contentIFrame{
  width:1920px;
  height:1080px;
  border:0;
  display:block;
}

/* BOTONES */
.prev, .next{
  position:fixed;
  top:50%;
  transform:translateY(-50%);
  z-index:9999;
  font-size:60px;
  cursor:pointer;
  color:white;
  padding:10px 18px;
  background:rgba(0,0,0,0.3);
  border-radius:10px;
  user-select:none;
}

.prev{ left:10px; }
.next{ right:10px; }
</style>
</head>

<body onload="showHideArrows()">

<div id="viewport">
  <div id="stage">
    <iframe 
      id="contentIFrame"
      src="publication-web-resources/html/publication.html">
    </iframe>
  </div>
</div>

<div class="prev" onclick="showPreviousPage()">&#10094;</div>
<div class="next" onclick="showNextPage()">&#10095;</div>

<script>
const BASE_W = 1920;
const BASE_H = 1080;

function fit() {
  const iframe = document.getElementById('contentIFrame');

  const scale = Math.min(
    window.innerWidth / BASE_W,
    window.innerHeight / BASE_H
  );

  // usamos zoom (NO transform) para evitar texto duplicado
  iframe.style.zoom = scale;

  try {
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.documentElement.style.overflow = 'hidden';
    doc.body.style.overflow = 'hidden';
    doc.body.style.margin = '0';
  } catch(e){}
}

window.addEventListener('resize', fit);
document.getElementById('contentIFrame').addEventListener('load', fit);
</script>

</body>
</html>
