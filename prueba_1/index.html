<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="publication-web-resources/css/main.css" rel="stylesheet" type="text/css">
<script src="publication-web-resources/script/main.js" type="text/javascript"></script>

<style>
html, body{
  margin:0;
  padding:0;
  overflow:hidden;
}

/* contenedor pantalla */
#viewport{
  width:100vw;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* tamaño real del diseño */
#stage{
  width:1920px;
  height:1080px;   /* tu tamaño real */
  transform-origin: top left;
  transform: scale(var(--scale));
}

/* escala automática */
#viewport{
  --scale: min(calc(100vw / 1920), calc(100vh / 1080));
}

/* iframe encaja perfecto */
#contentIFrame{
  width:1920px;
  height:1080px;
  border:0;
  display:block;
}
</style>

</head>

<body onload="showHideArrows()">

<div id="viewport">
  <div id="stage">
    <iframe 
      onload="showHideArrows()" 
      id="contentIFrame" 
      class="contentIframeClass" 
      src="publication-web-resources/html/publication.html">
    </iframe>
  </div>
</div>

<iframe id="dummyIFrame" class="dummyFrameClass"></iframe>
<div class="prev" onclick="showPreviousPage()">&#10094;</div>
<div class="next" onclick="showNextPage()">&#10095;</div>

</body>
</html>
