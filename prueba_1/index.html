<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    html, body { height: 100%; margin: 0; }
    body { background: #111; overflow: hidden; }

    /* pantalla */
    #viewport{
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
    }

    /* “stage” escalable (sin necesitar saber el alto exacto) */
    #stage{
      width: var(--w);
      height: var(--h);
      transform-origin: top left;
      transform: scale(var(--s));
      background: transparent;
    }

    iframe{
      width: var(--w);
      height: var(--h);
      border: 0;
      display: block;
      background: transparent;
    }
  </style>
</head>

<body>
  <div id="viewport">
    <div id="stage">
      <iframe id="contentIFrame"
              src="publication-web-resources/html/publication.html"
              title="Presentación">
      </iframe>
    </div>
  </div>

  <script>
    // PONÉ ACÁ EL ANCHO BASE de tu diseño (si exportaste a 1920, dejalo)
    const BASE_W = 1920;

    // Detecta alto real del contenido y escala para que entre en pantalla
    function fit(){
      const iframe = document.getElementById('contentIFrame');
      const stage  = document.getElementById('stage');

      // Ancho fijo, alto real desde el contenido (si el navegador lo permite)
      let h = 1080; // fallback

      try {
        const doc = iframe.contentDocument || iframe.contentWindow.document;
        const body = doc.body;
        const html = doc.documentElement;
        h = Math.max(
          body.scrollHeight, body.offsetHeight,
          html.clientHeight, html.scrollHeight, html.offsetHeight
        );
      } catch(e) {
        // si no se puede leer (por seguridad), usamos fallback
      }

      // set CSS vars
      stage.style.setProperty('--w', BASE_W + 'px');
      stage.style.setProperty('--h', h + 'px');

      const s = Math.min(window.innerWidth / BASE_W, window.innerHeight / h);
      stage.style.setProperty('--s', s);
    }

    window.addEventListener('resize', fit);
    document.getElementById('contentIFrame').addEventListener('load', fit);
  </script>
</body>
</html>
