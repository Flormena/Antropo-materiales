<!DOCTYPE html>
<html>
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<style>
			/* Eliminar márgenes y padding del body */
			body {
				margin: 0;
				padding: 0;
				overflow: hidden; /* Evita scroll innecesario */
				height: 100vh; /* Altura total de la ventana */
				width: 100vw; /* Ancho total de la ventana */
			}
			
			/* Hacer que el iframe ocupe todo el espacio */
			.contentIframeClass {
				position: fixed;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
				border: none; /* Quita el borde del iframe */
				margin: 0;
				padding: 0;
			}
			
			/* Mantener las flechas de navegación visibles y funcionales */
			.prev, .next {
				position: fixed;
				top: 50%;
				transform: translateY(-50%);
				z-index: 1000; /* Para que estén sobre el iframe */
				cursor: pointer;
				/* Agrega más estilos si quieres personalizar las flechas */
			}
			
			.prev {
				left: 10px;
			}
			
			.next {
				right: 10px;
			}
		</style>
		<link href="publication-web-resources/css/main.css" rel="stylesheet" type="text/css">
		<script src="publication-web-resources/script/main.js" type="text/javascript">
		</script>
	</head>
	<body onload="showHideArrows()">
		<iframe onload="showHideArrows()" id="contentIFrame" class="contentIframeClass" src="publication-web-resources/html/publication.html"></iframe>
		<iframe id="dummyIFrame" class="dummyFrameClass"></iframe>
		<div class="prev" onclick="showPreviousPage()">&#10094;</div>
		<div class="next" onclick="showNextPage()">&#10095;</div>
	</body>
</html>
